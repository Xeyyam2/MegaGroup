name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Eyni branch-da ardıcıl push-lərde köhnə run-ları ləğv edir
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Type-check · Build · Test
    runs-on: ubuntu-latest

    env:
      # Build və test üçün boş/kukla Supabase env-ləri kifayətdir —
      # app `isSupabaseConfigured()` false olduqda statik fallback işlədir.
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    name: Playwright E2E (chromium · firefox · webkit · mobile)
    runs-on: ubuntu-latest
    needs: build

    env:
      # Build və test üçün boş/kukla Supabase env-ləri kifayətdir —
      # app `isSupabaseConfigured()` false olduqda statik fallback işlədir.
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # Lighthouse performans bucdesi — seo.md Faza 2.6. LCP/CLS/INP regression.
  # Aktivlesdirmek: 1) npm i -D @lhci/cli  2) lighthouserc.json  3) if:false -> if:true
  lighthouse:
    name: Lighthouse Budget
    runs-on: ubuntu-latest
    needs: build
    if: false
    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Start preview server
        run: npm run start &
      - name: Run Lighthouse CI
        run: npx @lhci/cli autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
