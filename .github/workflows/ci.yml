name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Eyni branch-da ardıcıl push-lərde köhnə run-ları ləğv edir
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Type-check · Build · Test
    runs-on: ubuntu-latest

    env:
      # Build və test üçün boş/kukla Supabase env-ləri kifayətdir —
      # app `isSupabaseConfigured()` false olduqda statik fallback işlədir.
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
